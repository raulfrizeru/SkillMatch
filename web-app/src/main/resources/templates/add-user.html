<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SkillMatch - Create Account</title>
    <head th:replace="~{fragments/navbar :: bootstrap-css}"></head>
</head>

<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: menu}"></div>

<div class="container flex-grow-1 d-flex align-items-center justify-content-center pt-5 mt-5 mb-4">
    <div class="glass-section-card w-100 p-4 p-md-5" style="max-width: 550px; padding: 3rem !important;">

        <div class="text-center mb-4">
            <div class="bg-white bg-opacity-50 text-teal rounded-circle d-inline-flex p-3 mb-3 shadow-sm" style="border: 1px solid rgba(255,255,255,0.8);">
                <i class="bi bi-person-plus-fill fs-2"></i>
            </div>
            <h2 class="fw-bolder text-dark-navy">Create an Account</h2>
            <p class="text-dark opacity-75">Join SkillMatch to find your perfect match.</p>
        </div>

        <form th:action="@{/users/save}" th:object="${user}" method="post">

            <div class="mb-4 bg-white bg-opacity-50 p-3 rounded-4 border shadow-sm" style="border-color: rgba(255,255,255,0.8) !important;">
                <label class="form-label text-dark-navy fw-bold mb-2 small">I want to register as a:</label>
                <select class="form-select form-select-lg border-0 shadow-sm" name="role" id="roleSelector" required onchange="toggleFields()">
                    <option value="" selected disabled>Select your role...</option>
                    <option value="CANDIDATE">Candidate (Looking for a job)</option>
                    <option value="EMPLOYER">Employer (Looking to hire)</option>
                </select>
            </div>

            <div id="candidateFields" style="display: none;">
                <div class="row g-2">
                    <div class="col-md-6 form-floating mb-3">
                        <input type="text" class="form-control bg-white bg-opacity-75 border-0 shadow-sm" id="firstName" th:field="*{firstName}" placeholder="First Name" />
                        <label for="firstName" class="ms-2 text-secondary">First Name</label>
                    </div>
                    <div class="col-md-6 form-floating mb-3">
                        <input type="text" class="form-control bg-white bg-opacity-75 border-0 shadow-sm" id="lastName" th:field="*{lastName}" placeholder="Last Name" />
                        <label for="lastName" class="ms-2 text-secondary">Last Name</label>
                    </div>
                </div>
            </div>

            <div id="employerFields" style="display: none;">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control bg-white bg-opacity-75 border-0 shadow-sm" id="companyName" th:field="*{companyName}" placeholder="Company Name" />
                    <label for="companyName" class="text-secondary">Company Name</label>
                </div>
            </div>

            <div class="form-floating mb-3">
                <input type="text" class="form-control bg-white bg-opacity-75 border-0 shadow-sm" id="username" th:field="*{username}" placeholder="Username" required />
                <label for="username" class="text-secondary"><i class="bi bi-person me-2"></i>Username</label>
            </div>

            <div class="form-floating mb-3">
                <input type="email" class="form-control bg-white bg-opacity-75 border-0 shadow-sm" id="email" th:field="*{email}" placeholder="name@example.com" required />
                <label for="email" class="text-secondary"><i class="bi bi-envelope me-2"></i>Email address</label>
            </div>

            <div class="row g-2">
                <div class="col-md-6 form-floating mb-3">
                    <input type="password" class="form-control bg-white bg-opacity-75 border-0 shadow-sm" id="password" th:field="*{password}" placeholder="Password" required />
                    <label for="password" class="ms-2 text-secondary"><i class="bi bi-lock me-1"></i>Password</label>
                </div>
                <div class="col-md-6 form-floating mb-4">
                    <input type="password" class="form-control bg-white bg-opacity-75 border-0 shadow-sm" id="confirmPassword" th:field="*{confirmPassword}" placeholder="Confirm Password" required />
                    <label for="confirmPassword" class="ms-2 text-secondary"><i class="bi bi-lock-fill me-1"></i>Confirm</label>
                </div>
            </div>

            <button type="submit" class="btn btn-teal btn-lg w-100 fw-bold shadow-sm mb-3 rounded-pill mt-2">
                Sign Up <i class="bi bi-arrow-right ms-2"></i>
            </button>

        </form>

        <div class="text-center mt-3">
            <span class="text-dark opacity-75">Already have an account?</span>
            <a th:href="@{/login}" class="text-teal fw-bolder text-decoration-none ms-1">Log in here</a>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleFields() {
        var role = document.getElementById("roleSelector").value;
        var candFields = document.getElementById("candidateFields");
        var empFields = document.getElementById("employerFields");
        if (role === 'CANDIDATE') {
            candFields.style.display = 'block';
            empFields.style.display = 'none';
        } else if (role === 'EMPLOYER') {
            candFields.style.display = 'none';
            empFields.style.display = 'block';
        } else {
            candFields.style.display = 'none';
            empFields.style.display = 'none';
        }
    }
</script>
</body>
</html>
