<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillMatch - Job Applicants</title>
    <head th:replace="~{fragments/navbar :: bootstrap-css}"></head>
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: menu}"></div>

<div class="container flex-grow-1 pt-5 mt-5 mb-5">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-5 gap-2">
        <div class="mb-3 mb-md-0">
            <h1 class="fw-bolder text-dark-navy mb-1">Applicants</h1>
            <p class="text-dark opacity-75 mb-0 fs-5">
                Reviewing candidates for: <span class="fw-bold text-teal" th:text="${job.title}">Job Title</span>
            </p>
        </div>
        <div class="d-flex gap-2">
            <form th:action="@{/jobs/{jobId}/applicants/calculate-all-scores(jobId=${jobId})}" method="GET" class="d-inline">
                <input type="hidden" name="model" class="ai-model-input" value="llama3.2:1b">
                <button type="submit" class="btn btn-outline-teal shadow-sm rounded-pill px-4 py-2 fw-bold d-inline-flex align-items-center">
                    <i class="bi bi-calculator me-2"></i> Calculate Score to all
                </button>
            </form>
            <a th:href="@{/jobs/{id}(id=${job.id})}" class="btn btn-glass-outline shadow-sm rounded-pill px-4 py-2 fw-bold d-inline-flex align-items-center">
                <i class="bi bi-arrow-left me-2"></i> Back to Job Details
            </a>
        </div>
    </div>

    <div class="d-flex align-items-center gap-2 mb-4">
        <label for="aiModelSelect" class="fw-semibold text-dark">Select AI model:</label>
        <select id="aiModelSelect" class="form-select form-select-sm w-auto" aria-label="AI model">
            <option value="llama3.2:1b" selected>Small</option>
            <option value="gemma4:31b-cloud">Large</option>
        </select>
    </div>

    <div class="row">
        <div class="col-12">

            <div th:each="app : ${applicants}" class="glass-section-card applicant-card p-4 mb-4 d-flex flex-column flex-lg-row align-items-lg-center justify-content-between">

                <div class="d-flex align-items-center mb-4 mb-lg-0">
                    <img th:src="@{'https://ui-avatars.com/api/?name=' + ${app.candidateName} + '&background=cae3f0&color=0c1f36&rounded=true&bold=true'}"
                         alt="Avatar" class="me-4 shadow-sm" style="width: 70px; height: 70px; border: 3px solid rgba(255,255,255,0.7);">

                    <div>
                        <h4 class="fw-bold text-dark-navy mb-1" th:text="${app.candidateName}">Candidate Name</h4>
                        <div class="d-flex flex-column flex-md-row text-dark opacity-75 gap-2 gap-md-4 mt-2">
                            <span class="d-flex align-items-center small fw-medium">
                                <i class="bi bi-envelope-at me-2 text-teal"></i>
                                <span th:text="${app.candidateEmail}">email@example.com</span>
                            </span>
                            <span class="d-flex align-items-center small fw-medium">
                                <i class="bi bi-calendar3 me-2 text-teal"></i>
                                Applied: <span class="ms-1" th:text="${#temporals.format(app.applyDate, 'dd MMM yyyy')}">01 Jan 2026</span>
                            </span>
                        </div>
                    </div>
                </div>

                <div class="d-flex flex-wrap align-items-center gap-4">

                    <span class="badge rounded-pill px-3 py-2 fw-bold"
                          th:classappend="${app.status == 'PENDING' ? 'bg-warning bg-opacity-10 text-warning border border-warning border-opacity-25' :
                                          (app.status == 'ACCEPTED' ? 'bg-success bg-opacity-10 text-success border border-success border-opacity-25' :
                                          'bg-danger bg-opacity-10 text-danger border border-danger border-opacity-25')}"
                          th:text="${app.status}">
                    </span>

                    <!-- Score Badge -->
                    <div th:replace="~{fragments/score-badge :: scoreBadge(score=${app.finalScore})}"></div>

                    <!-- Action Buttons Section -->
                    <div class="d-flex gap-2 flex-wrap">
                        <a th:href="@{/{path}(path=${app.candidateCvPath})}" target="_blank" class="btn btn-info rounded-pill px-4 py-2 fw-bold shadow-sm">
                            <i class="bi bi-file-pdf me-1"></i> View CV
                        </a>
                        <form th:action="@{/jobs/{jobId}/applicants/{applicationId}/calculate-score(jobId=${jobId},applicationId=${app.id})}" method="GET" class="d-inline">
                            <input type="hidden" name="model" class="ai-model-input" value="llama3.2:1b">
                            <button type="submit" class="btn btn-outline-teal rounded-pill px-4 py-2 fw-bold">
                                <i class="bi bi-calculator me-1"></i> Calculate Score
                            </button>
                        </form>

                        <!-- Book Interview Button -->
                        <button type="button" class="btn btn-primary rounded-pill px-4 py-2 fw-bold" data-bs-toggle="modal" th:attr="data-bs-target='#interviewModal' + ${app.id}">
                            <i class="bi bi-calendar-event me-1"></i> Book Interview
                        </button>

                        <!-- Hire Button -->
                        <form th:action="@{/jobs/{jobId}/applicants/{applicationId}/hire(jobId=${jobId},applicationId=${app.id})}" method="POST" class="d-inline">
                            <button type="submit" class="btn btn-success rounded-pill px-4 py-2 fw-bold" onclick="return confirm('Are you sure you want to hire this candidate?');">
                                <i class="bi bi-check-circle me-1"></i> Hire
                            </button>
                        </form>

                        <!-- Reject Button -->
                        <form th:action="@{/jobs/{jobId}/applicants/{applicationId}/reject(jobId=${jobId},applicationId=${app.id})}" method="POST" class="d-inline">
                            <button type="submit" class="btn btn-danger rounded-pill px-4 py-2 fw-bold" onclick="return confirm('Are you sure you want to reject this candidate?');">
                                <i class="bi bi-x-circle me-1"></i> Reject
                            </button>
                        </form>
                    </div>

                </div>
            </div>

            <!-- All Book Interview Modals - Outside th:each -->
            <div th:each="app : ${applicants}">
                <div class="modal fade" th:attr="id='interviewModal' + ${app.id}" tabindex="-1" aria-labelledby="interviewModalLabel" aria-hidden="true">
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title" id="interviewModalLabel">Book Interview</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                            </div>
                            <form th:action="@{/jobs/{jobId}/applicants/{applicationId}/book-interview(jobId=${jobId},applicationId=${app.id})}" method="POST">
                                <div class="modal-body">
                                    <div class="mb-3">
                                        <label th:attr="for='interviewDateTime' + ${app.id}" class="form-label">Interview Date & Time</label>
                                        <input type="datetime-local" class="form-control" th:attr="id='interviewDateTime' + ${app.id}" name="interviewDateTime" required>
                                    </div>
                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                    <button type="submit" class="btn btn-primary">Book Interview</button>
                                </div>
                            </form>
                        </div>
                    </div>

                </div>
            </div>

            <div th:if="${#lists.isEmpty(applicants)}" class="glass-section-card p-5 text-center mt-4">
                <div class="bg-white bg-opacity-50 rounded-circle d-inline-flex align-items-center justify-content-center mb-4 shadow-sm" style="width: 100px; height: 100px; border: 1px solid rgba(255,255,255,0.8);">
                    <i class="bi bi-people text-teal" style="font-size: 40px; opacity: 0.8;"></i>
                </div>
                <h3 class="fw-bolder text-dark-navy mb-2">No applicants yet</h3>
                <p class="text-dark opacity-75 mb-0 fs-5">Candidates who apply for this position will appear here.</p>
            </div>

        </div>
    </div>

</div>

<footer th:replace="~{fragments/footer :: subsol}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const aiModelSelect = document.getElementById('aiModelSelect');
    const aiModelInputs = document.querySelectorAll('.ai-model-input');

    if (aiModelSelect) {
        const syncModel = () => {
            aiModelInputs.forEach((input) => {
                input.value = aiModelSelect.value;
            });
        };
        syncModel();
        aiModelSelect.addEventListener('change', syncModel);
    }
</script>
</body>
</html>
