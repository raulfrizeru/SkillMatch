<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillMatch - Job Applicants</title>
    <head th:replace="~{fragments/navbar :: bootstrap-css}"></head>
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: menu}"></div>

<div class="container flex-grow-1 pt-5 mt-5 mb-5">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-5">
        <div class="mb-3 mb-md-0">
            <h1 class="fw-bolder text-dark-navy mb-1">Applicants</h1>
            <p class="text-dark opacity-75 mb-0 fs-5">
                Reviewing candidates for: <span class="fw-bold text-teal" th:text="${job.title}">Job Title</span>
            </p>
        </div>
        <a th:href="@{/jobs/{id}(id=${job.id})}" class="btn btn-glass-outline shadow-sm rounded-pill px-4 py-2 fw-bold d-inline-flex align-items-center">
            <i class="bi bi-arrow-left me-2"></i> Back to Job Details
        </a>
    </div>

    <div class="row">
        <div class="col-12">

            <div th:each="app : ${applicants}" class="glass-section-card applicant-card p-4 mb-4 d-flex flex-column flex-lg-row align-items-lg-center justify-content-between">

                <div class="d-flex align-items-center mb-4 mb-lg-0">
                    <img th:src="@{'https://ui-avatars.com/api/?name=' + ${app.candidateName} + '&background=cae3f0&color=0c1f36&rounded=true&bold=true'}"
                         alt="Avatar" class="me-4 shadow-sm" style="width: 70px; height: 70px; border: 3px solid rgba(255,255,255,0.7);">

                    <div>
                        <h4 class="fw-bold text-dark-navy mb-1" th:text="${app.candidateName}">Candidate Name</h4>
                        <div class="d-flex flex-column flex-md-row text-dark opacity-75 gap-2 gap-md-4 mt-2">
                            <span class="d-flex align-items-center small fw-medium">
                                <i class="bi bi-envelope-at me-2 text-teal"></i>
                                <span th:text="${app.candidateEmail}">email@example.com</span>
                            </span>
                            <span class="d-flex align-items-center small fw-medium">
                                <i class="bi bi-calendar3 me-2 text-teal"></i>
                                Applied: <span class="ms-1" th:text="${#temporals.format(app.applyDate, 'dd MMM yyyy')}">01 Jan 2026</span>
                            </span>
                        </div>
                    </div>
                </div>

                <div class="d-flex flex-wrap align-items-center gap-4">

                    <span class="badge rounded-pill px-3 py-2 fw-bold"
                          th:classappend="${app.status == 'PENDING' ? 'bg-warning bg-opacity-10 text-warning border border-warning border-opacity-25' :
                                          (app.status == 'ACCEPTED' ? 'bg-success bg-opacity-10 text-success border border-success border-opacity-25' :
                                          'bg-danger bg-opacity-10 text-danger border border-danger border-opacity-25')}"
                          th:text="${app.status}">
                    </span>

                    <div class="score-badge-simple">
                        <div class="score-wheel-container"
                             th:style="'background: conic-gradient(#0e8b8c ' + ${(app.finalScore ?: 0) * 100} + '%, rgba(255,255,255,0.2) 0);'">
                            <div class="score-inner-circle">
                                <span class="fw-bolder text-dark-navy fs-5 lh-1"
                                      th:text="${app.finalScore != null ? #numbers.formatDecimal(app.finalScore * 100, 1, 0) + '%' : '--'}">
                                    0%
                                </span>
                            </div>
                        </div>
                        <span class="text-secondary fw-bold text-uppercase tracking-wide" style="font-size: 0.75rem;">Match Score</span>
                    </div>

                    <a th:href="@{/applications/{id}(id=${app.id})}" class="btn btn-teal rounded-pill px-4 py-2 fw-bold shadow-sm">
                        View Details <i class="bi bi-chevron-right ms-1" style="font-size: 0.8rem;"></i>
                    </a>

                </div>
            </div>

            <div th:if="${#lists.isEmpty(applicants)}" class="glass-section-card p-5 text-center mt-4">
                <div class="bg-white bg-opacity-50 rounded-circle d-inline-flex align-items-center justify-content-center mb-4 shadow-sm" style="width: 100px; height: 100px; border: 1px solid rgba(255,255,255,0.8);">
                    <i class="bi bi-people text-teal" style="font-size: 40px; opacity: 0.8;"></i>
                </div>
                <h3 class="fw-bolder text-dark-navy mb-2">No applicants yet</h3>
                <p class="text-dark opacity-75 mb-0 fs-5">Candidates who apply for this position will appear here.</p>
            </div>

        </div>
    </div>

</div>

<footer th:replace="~{fragments/footer :: subsol}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
