<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SkillMatch - Browse Jobs</title>
    <head th:replace="~{fragments/navbar :: bootstrap-css}"></head>
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: menu}"></div>

<div class="container flex-grow-1 pt-5 mt-5 mb-5">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-5">
        <div class="mb-3 mb-md-0">
            <h1 class="fw-bolder text-dark-navy mb-1" th:text="${role == 'CANDIDATE' ? 'Available Jobs' : 'My Job Posts'}">Available Jobs</h1>
            <p class="text-dark opacity-75 mb-0 fs-5" th:text="${role == 'CANDIDATE' ? 'Find your next big opportunity.' : 'Manage your job postings'}">Find your next big opportunity.</p>
        </div>
        <div class="d-flex gap-2 align-items-center">
            <a th:if="${role == 'EMPLOYER'}" th:href="@{/jobs/new}" class="btn btn-success rounded-pill px-4 py-2 fw-bold d-inline-flex align-items-center shadow-sm">
                <i class="bi bi-plus-circle me-2"></i> Add New Job
            </a>
            <a th:href="@{/dashboard}" class="btn btn-glass-outline shadow-sm rounded-pill px-4 py-2 fw-bold d-inline-flex align-items-center">
                <i class="bi bi-arrow-left me-2"></i> Back to Dashboard
            </a>
        </div>
    </div>

    <!-- Filter -->
    <div class="glass-section-card p-4 mb-4">
        <form th:action="@{/jobs}" method="get" class="row g-3">
            <!-- Search Input -->
            <div class="col-md-6">
                <label for="searchInput" class="form-label fw-bold text-dark-navy">Search by Title, Description or Company</label>
                <input type="text" class="form-control rounded-3" id="searchInput" name="search"
                       th:value="${search}" placeholder="Search jobs, companies...">
            </div>

            <div class="col-md-3">
                <label for="sortBy" class="form-label fw-bold text-dark-navy">Sort By</label>
                <select class="form-select rounded-3" id="sortBy" name="sortBy">
                    <option value="">-- Select --</option>
                    <option value="date_newest" th:selected="${sortBy == 'date_newest'}">Newest First</option>
                    <option value="date_oldest" th:selected="${sortBy == 'date_oldest'}">Oldest First</option>
                    <option value="name_asc" th:selected="${sortBy == 'name_asc'}">Name (A-Z)</option>
                    <option value="name_desc" th:selected="${sortBy == 'name_desc'}">Name (Z-A)</option>
                </select>
            </div>

            <div class="col-md-3" th:if="${role == 'EMPLOYER'}">
                <label for="statusFilter" class="form-label fw-bold text-dark-navy">Status</label>
                <select class="form-select rounded-3" id="statusFilter" name="status">
                    <option value="">-- All --</option>
                    <option value="active" th:selected="${status == 'active'}">Active</option>
                    <option value="inactive" th:selected="${status == 'inactive'}">Inactive</option>
                </select>
            </div>

            <div class="col-12 d-flex gap-2">
                <button type="submit" class="btn btn-teal rounded-pill px-4 py-2 fw-bold shadow-sm">
                    <i class="bi bi-search me-2"></i> Apply Filters
                </button>
                <a th:href="@{/jobs}" class="btn btn-glass-outline rounded-pill px-4 py-2 fw-bold">
                    <i class="bi bi-arrow-clockwise me-2"></i> Clear Filters
                </a>
            </div>
        </form>
    </div>

    <div class="row">
        <div class="col-12">

            <div th:each="job : ${jobs}" class="glass-section-card job-card p-4 mb-4 d-flex flex-column flex-md-row align-items-md-center justify-content-between">

                <div class="d-flex align-items-center mb-4 mb-md-0">
                    <div class="bg-white bg-opacity-75 rounded-4 d-flex align-items-center justify-content-center shadow-sm me-4" style="width: 70px; height: 70px; border: 1px solid rgba(255,255,255,0.8);">
                        <i class="bi bi-briefcase text-teal fs-2"></i>
                    </div>
                    <div>
                        <h4 class="fw-bold text-dark-navy mb-1" th:text="${job.title}">Job Title</h4>
                        <div class="d-flex flex-wrap align-items-center text-dark opacity-75 gap-3 mt-2">
                            <span class="d-flex align-items-center fw-medium">
                                <i class="bi bi-building me-2 text-teal"></i>
                                <span th:text="${job.companyName}">Company Name</span>
                            </span>
                        </div>
                    </div>
                </div>

                <div class="d-flex align-items-center gap-3">
                    <span class="badge rounded-pill px-3 py-2 fw-bold"
                          th:classappend="${job.isActive ? 'bg-success bg-opacity-10 text-success border border-success border-opacity-25' : 'bg-secondary bg-opacity-10 text-secondary border border-secondary border-opacity-25'}"
                          th:text="${job.isActive ? 'Open' : 'Closed'}">
                    </span>

                    <div th:if="${role == 'EMPLOYER'}" class="badge rounded-pill px-3 py-2 fw-bold bg-info bg-opacity-10 text-info border border-info border-opacity-25">
                        <i class="bi bi-people me-1"></i>
                        <span th:text="${job.applicantCount}">0</span>
                        <span th:text="${job.applicantCount == 1 ? 'Applicant' : 'Applicants'}">Applicants</span>
                    </div>

                    <div>
                        <a class="btn btn-teal rounded-pill px-4 py-2 shadow-sm fw-bold" th:href="@{/jobs/{id}(id=${job.id})}">
                            View Details
                        </a>
                    </div>

                    <div th:if="${role == 'EMPLOYER'}">
                        <a th:href="@{/jobs/delete/{id}(id=${job.id})}" class="btn btn-sm btn-outline-danger rounded-pill px-3 py-1 fw-bold">
                            <i class="bi bi-trash"></i> Delete
                        </a>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(jobs)}" class="glass-section-card p-5 text-center mt-4">
                <div class="icon-glass-box mx-auto mb-4" style="width: 120px; height: 120px;">
                    <i class="bi bi-search text-teal" style="font-size: 50px; opacity: 0.8;"></i>
                </div>
                <h3 class="fw-bolder text-dark-navy mb-2">No jobs available right now</h3>
                <p class="text-dark opacity-75 mb-0 fs-5">Check back later or update your profile preferences to see new opportunities.</p>
            </div>

        </div>
    </div>

</div>


<footer th:replace="~{fragments/footer :: subsol}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
