<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SkillMatch - Log In</title>
    <head th:replace="~{fragments/navbar :: bootstrap-css}"></head>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: menu}"></div>

<div class="container auth-wrapper flex-grow-1 d-flex align-items-center">
    <div class="card shadow-lg border-0 auth-card w-100 p-4 p-md-5">

        <div class="text-center mb-4">
            <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex p-3 mb-3">
                <i class="bi bi-box-arrow-in-right fs-2"></i>
            </div>
            <h2 class="fw-bold text-dark">Welcome Back</h2>
            <p class="text-muted">Log in to your SkillMatch account.</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger shadow-sm text-center py-2 text-danger bg-danger bg-opacity-10 border-danger border-opacity-25" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>Invalid username or password.
        </div>

        <div th:if="${param.logout}" class="alert alert-success shadow-sm text-center py-2 text-success bg-success bg-opacity-10 border-success border-opacity-25" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>You have been logged out successfully.
        </div>

        <form th:action="@{/login}" method="post">

            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="username" name="username" placeholder="Username" required autofocus />
                <label for="username"><i class="bi bi-person me-2"></i>Username</label>
            </div>

            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="password" name="password" placeholder="Password" required />
                <label for="password"><i class="bi bi-lock me-2"></i>Password</label>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4 mt-2">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="remember-me" id="rememberMe">
                    <label class="form-check-label text-secondary small" for="rememberMe">
                        Remember me
                    </label>
                </div>
                <a href="#" class="text-primary text-decoration-none small fw-medium">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm mb-3">
                Log In <i class="bi bi-arrow-right ms-2"></i>
            </button>

        </form>

        <div class="text-center mt-3">
            <span class="text-muted">Don't have an account?</span>
            <a th:href="@{/users/new}" class="text-primary fw-bold text-decoration-none">Sign up here</a>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
