<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="bootstrap-css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link th:href="@{/css/style.css}" rel="stylesheet" />
</head>
<body class="bg-light d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: menu}"></div>

<section class="hero-section">
    <div class="container">
        <div class="row">
            <div class="col-lg-8">
                <h1 class="hero-title">Find the perfect job or the ideal candidate, simple and smart.</h1>
            </div>
        </div>
    </div>
</section>

<section class="container cards-container">
    <div class="row justify-content-center g-4">
        <div class="col-md-5">
            <a th:href="@{/users/new}" class="role-card text-center p-5 border border-light">
                <i class="bi bi-file-earmark-person icon-large mb-3"></i>
                <h2 class="fw-bold mb-0">I'm a candidate</h2>
            </a>
        </div>

        <div class="col-md-5">
            <a th:href="@{/users/new}" class="role-card text-center p-5 border border-light">
                <i class="bi bi-building icon-large mb-3"></i>
                <h2 class="fw-bold mb-0">I'm an employer</h2>
            </a>
        </div>
    </div>
</section>

<section class="container text-center my-5 py-4">
    <div class="row justify-content-center g-5">
        <div class="col-md-4 d-flex align-items-center justify-content-center gap-3">
            <i class="bi bi-cpu fs-2 text-primary"></i>
            <h4 class="fw-bold mb-0">AI-Powered Matching</h4>
        </div>
        <div class="col-md-4 d-flex align-items-center justify-content-center gap-3">
            <i class="bi bi-person-badge fs-2 text-primary"></i>
            <h4 class="fw-bold mb-0">Verified Profiles</h4>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
