<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillMatch - Users Management</title>
    <head th:replace="~{fragments/navbar :: bootstrap-css}"></head>
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: menu}"></div>

<div class="container flex-grow-1 pt-5 mt-5 mb-5">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-5">
        <div class="mb-3 mb-md-0">
            <h1 class="fw-bolder text-dark-navy mb-1">Users Management</h1>
            <p class="text-dark opacity-75 mb-0 fs-5">Manage platform accounts and roles.</p>
        </div>
        <a th:href="@{/users/new}" class="btn btn-teal shadow-sm rounded-pill px-4 py-2 fw-bold d-inline-flex align-items-center">
            <i class="bi bi-person-plus me-2"></i> Add New User
        </a>
    </div>

    <div class="row">
        <div class="col-12">

            <div th:each="u : ${users}" class="glass-section-card user-card p-4 mb-4 d-flex flex-column flex-md-row align-items-md-center justify-content-between">

                <div class="d-flex align-items-center mb-4 mb-md-0">
                    <img th:src="@{'https://ui-avatars.com/api/?name=' + ${u.username} + '&background=cae3f0&color=0c1f36&rounded=true&bold=true'}"
                         alt="Avatar" class="me-4 shadow-sm" style="width: 65px; height: 65px; border: 3px solid rgba(255,255,255,0.7);">

                    <div>
                        <div class="d-flex align-items-center gap-2 mb-1">
                            <h4 class="fw-bold text-dark-navy mb-0" th:text="${u.username}">Username</h4>
                            <span class="text-muted small fw-medium" th:text="'(ID: ' + ${u.id} + ')'">#1</span>
                        </div>
                        <div class="d-flex align-items-center text-dark opacity-75 mt-1">
                            <span class="d-flex align-items-center small fw-medium">
                                <i class="bi bi-envelope-at me-2 text-teal"></i>
                                <span th:text="${u.email}">email@example.com</span>
                            </span>
                        </div>
                    </div>
                </div>

                <div class="d-flex flex-wrap align-items-center gap-4">

                    <span class="badge rounded-pill px-3 py-2 fw-bold"
                          th:classappend="${u.role == 'EMPLOYER' ? 'bg-success bg-opacity-10 text-success border border-success border-opacity-25' :
                                          (u.role == 'CANDIDATE' ? 'bg-info bg-opacity-10 text-info border border-info border-opacity-25' :
                                          'bg-secondary bg-opacity-10 text-secondary border border-secondary border-opacity-25')}"
                          th:text="${u.role}">
                    </span>

                    <div class="d-flex gap-2">
                        <a th:href="@{/users/edit/{id}(id=${u.id})}" class="btn btn-sm btn-glass-outline rounded-pill px-3 py-2 fw-bold d-flex align-items-center">
                            <i class="bi bi-pencil-square me-1"></i> Edit
                        </a>
                        <a th:href="@{/users/delete/{id}(id=${u.id})}" class="btn btn-sm btn-outline-danger bg-white bg-opacity-50 rounded-pill px-3 py-2 fw-bold d-flex align-items-center" onclick="return confirm('Are you sure you want to delete this user?');">
                            <i class="bi bi-trash3 me-1"></i> Delete
                        </a>
                    </div>

                </div>
            </div>

            <div th:if="${#lists.isEmpty(users)}" class="glass-section-card p-5 text-center mt-4">
                <div class="bg-white bg-opacity-50 rounded-circle d-inline-flex align-items-center justify-content-center mb-4 shadow-sm" style="width: 100px; height: 100px; border: 1px solid rgba(255,255,255,0.8);">
                    <i class="bi bi-people text-teal" style="font-size: 40px; opacity: 0.8;"></i>
                </div>
                <h3 class="fw-bolder text-dark-navy mb-2">No users found</h3>
                <p class="text-dark opacity-75 mb-4 fs-5">There are no registered users in the platform yet.</p>
                <a th:href="@{/users/new}" class="btn btn-teal rounded-pill px-4 py-2 fw-bold shadow-sm">
                    <i class="bi bi-person-plus me-2"></i> Create First User
                </a>
            </div>

        </div>
    </div>

</div>

<footer th:replace="~{fragments/footer :: subsol}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
