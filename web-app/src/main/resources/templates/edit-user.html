<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SkillMatch - Edit Profile</title>
    <head th:replace="~{fragments/navbar :: bootstrap-css}"></head>
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: menu}"></div>

<div class="container flex-grow-1 d-flex align-items-center justify-content-center pt-5 mt-5 mb-4">
    <div class="glass-section-card w-100 p-4 p-md-5" style="max-width: 550px; padding: 3rem !important;">

        <div class="text-center mb-4">
            <div class="bg-white bg-opacity-50 text-teal rounded-circle d-inline-flex p-3 mb-3 shadow-sm" style="border: 1px solid rgba(255,255,255,0.8);">
                <i class="bi bi-person-lines-fill fs-2"></i>
            </div>
            <h2 class="fw-bolder text-dark-navy">Edit Profile</h2>
            <p class="text-dark opacity-75">Update account details below.</p>
        </div>

        <form th:action="@{/users/edit/{id}(id=${user.id})}" th:object="${user}" method="post">

            <input type="hidden" th:field="*{id}" />

            <div class="form-floating mb-3">
                <input type="text" class="form-control bg-white bg-opacity-75 border-0 shadow-sm" id="username" th:field="*{username}" placeholder="Username" required />
                <label for="username" class="text-secondary"><i class="bi bi-person me-2"></i>Username</label>
            </div>

            <div class="form-floating mb-4">
                <input type="email" class="form-control bg-white bg-opacity-75 border-0 shadow-sm" id="email" th:field="*{email}" placeholder="name@example.com" required />
                <label for="email" class="text-secondary"><i class="bi bi-envelope-at me-2"></i>Email Address</label>
            </div>

            <div class="d-flex gap-3 mt-5">
                <a th:href="@{/users}" class="btn btn-glass-outline rounded-pill w-50 py-2 fw-bold d-flex align-items-center justify-content-center">
                    Cancel
                </a>
                <button type="submit" class="btn btn-teal rounded-pill w-50 py-2 fw-bold shadow-sm d-flex align-items-center justify-content-center">
                    Save Changes <i class="bi bi-check2-circle ms-2"></i>
                </button>
            </div>

        </form>

    </div>
</div>

<footer th:replace="~{fragments/footer :: subsol}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
