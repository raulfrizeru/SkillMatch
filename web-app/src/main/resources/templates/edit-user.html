<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SkillMatch - Edit Profile</title>
    <head th:replace="~{fragments/navbar :: bootstrap-css}"></head>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: menu}"></div>

<div class="container auth-wrapper flex-grow-1 d-flex align-items-center">
    <div class="card shadow-lg border-0 auth-card w-100 p-4 p-md-5">

        <div class="text-center mb-4">
            <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex p-3 mb-3">
                <i class="bi bi-pencil-square fs-2"></i>
            </div>
            <h2 class="fw-bold text-dark">Edit Profile</h2>
            <p class="text-muted">Update your account details below.</p>
        </div>

        <form th:action="@{/users/edit/{id}(id=${user.id})}" th:object="${user}" method="post">

            <input type="hidden" th:field="*{id}" />

            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="username" th:field="*{username}" placeholder="Username" required />
                <label for="username"><i class="bi bi-person me-2"></i>Username</label>
            </div>

            <div class="form-floating mb-4">
                <input type="email" class="form-control" id="email" th:field="*{email}" placeholder="name@example.com" required />
                <label for="email"><i class="bi bi-envelope me-2"></i>Email address</label>
            </div>

            <div class="d-flex gap-3 mt-4">
                <a th:href="@{/users}" class="btn btn-light btn-lg w-50 fw-bold shadow-sm text-secondary border">
                    Cancel
                </a>
                <button type="submit" class="btn btn-primary btn-lg w-50 fw-bold shadow-sm">
                    Save <i class="bi bi-check2-circle ms-1"></i>
                </button>
            </div>

        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
