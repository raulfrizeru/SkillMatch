<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="bootstrap-css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link th:href="@{/css/style.css}" rel="stylesheet" />
</head>
<body>

<nav th:fragment="menu" class="navbar navbar-expand-xl fixed-top glass-navbar mx-auto mt-3 px-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold text-dark-navy fs-4 d-flex align-items-center" th:href="@{/}">
            <i class="bi bi-hexagon-fill text-teal me-2"></i>SkillMatch
        </a>

        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto fw-bold text-dark-navy gap-3">
                <li class="nav-item"><a class="nav-link text-dark-navy" th:href="@{/}">Home</a></li>
                <li class="nav-item"><a class="nav-link text-dark-navy" th:href="@{/about}">About Us</a></li>

                <th:block sec:authorize="hasRole('CANDIDATE')">
                    <li class="nav-item"><a class="nav-link text-dark-navy" th:href="@{/dashboard}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link text-dark-navy" th:href="@{/applications}">My Applications</a></li>
                    <li class="nav-item"><a class="nav-link text-dark-navy" th:href="@{/jobs}">Job Search</a></li>
                    <li class="nav-item"><a class="nav-link text-dark-navy" th:href="@{/profile}">Profile</a></li>
                </th:block>

                <th:block sec:authorize="hasRole('EMPLOYER')">
                    <li class="nav-item"><a class="nav-link text-dark-navy" th:href="@{/dashboard}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link text-dark-navy" th:href="@{/jobs}">My Job Posts</a></li>
                    <li class="nav-item"><a class="nav-link text-dark-navy" th:href="@{/profile}">Profile</a></li>
                </th:block>
            </ul>

            <div class="d-flex gap-3 align-items-center mt-3 mt-xl-0">
                <th:block sec:authorize="!isAuthenticated()">
                    <a th:href="@{/login}" class="btn btn-glass-outline px-4 py-2 fw-bold rounded-pill">Log In</a>
                    <a th:href="@{/users/new}" class="btn btn-teal px-4 py-2 fw-bold rounded-pill shadow-sm">Sign Up</a>
                </th:block>

                <th:block sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <button type="submit" class="btn btn-outline-danger rounded-pill px-4 py-2 fw-bold">Log Out</button>
                    </form>
                </th:block>
            </div>
        </div>
    </div>
</nav>

</body>
</html>
